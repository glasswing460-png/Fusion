<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="OpenOrb"/>
<meta name="theme-color" content="#7c3aed"/>
<title>OpenOrb.ai</title>
<link rel="manifest" href="./manifest.webmanifest"/>
<link rel="icon" href="./icon-192.png" type="image/png"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xd0nmw577j");
</script>
<script src="https://unpkg.com/preact@10.20.1/dist/preact.min.js"></script>
<script src="https://unpkg.com/preact@10.20.1/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<style>
:root {
  --bg:#06060e; --bg2:#0c0c16; --bg3:#121224;
  --border:#1e1e38; --bfocus:#5b21b6;
  --purple:#7c3aed; --purplelt:#a78bfa;
  --text:#f1f5f9; --muted:#64748b; --dim:#334155;
  --green:#34d399; --red:#f87171; --amber:#fbbf24;
  --cyan:#67e8f9;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
.app{display:flex;height:100%;overflow:hidden}
.sb{width:268px;background:#04040a;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .2s ease}
.sb-head{padding:14px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-logo{display:flex;align-items:center;gap:7px;font-weight:800;font-size:14px;letter-spacing:.05em;color:#fff}
.sb-badge{font-size:9px;color:var(--purplelt);font-weight:700;background:rgba(124,58,237,.25);padding:2px 6px;border-radius:4px;border:1px solid rgba(124,58,237,.4)}
.sb-close{background:none;border:none;color:var(--muted);font-size:21px;cursor:pointer;display:none;line-height:1;padding:0 3px}
.sb-new{margin:9px;padding:9px 13px;border:1px solid var(--border);border-radius:9px;background:var(--bg2);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.sb-new:hover{border-color:var(--purple);background:var(--bg3)}
.sb-list{flex:1;overflow-y:auto;padding:0 7px 7px}
.sb-sec{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:11px 8px 5px}
.sb-item{width:100%;padding:8px 11px;border:none;background:none;color:var(--muted);font-size:12px;text-align:left;border-radius:7px;cursor:pointer;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .15s}
.sb-item:hover{background:var(--bg2);color:var(--text)}
.sb-item.active{background:rgba(124,58,237,.15);color:var(--purplelt);border-left:3px solid var(--purple);border-radius:0 7px 7px 0}
.sb-cfg{width:calc(100% - 22px);margin:0 11px 11px;padding:9px 13px;border:1px solid rgba(124,58,237,.3);border-radius:9px;background:rgba(124,58,237,.08);color:var(--purplelt);font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.sb-cfg:hover{border-color:var(--purple);background:rgba(124,58,237,.15)}
.mode-desc{font-size:11px;color:var(--muted);text-align:center;padding:4px 15px 0;min-height:18px;transition:opacity .2s}
.ex-chips{display:flex;flex-direction:column;gap:7px;width:100%;max-width:500px;margin-top:16px}
.ex-chip{text-align:left;padding:9px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;line-height:1.4;font-family:inherit}
.ex-chip:hover{border-color:var(--purple);color:var(--text);background:var(--bg3)}
@keyframes inputPulse{0%{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.25)}100%{border-color:var(--border);box-shadow:none}}
.input-pulse{animation:inputPulse .45s ease-out}
.sb-foot{padding:11px 15px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);background:#020206}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:20;backdrop-filter:blur(2px)}
.sb-overlay.show{display:block}
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100%}
.topbar{display:flex;align-items:center;gap:9px;padding:10px 15px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.menu-btn{background:none;border:none;color:var(--muted);font-size:19px;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px}
.menu-btn:hover{background:var(--bg3);color:var(--text)}
.top-title{flex:1;font-weight:700;font-size:14px;color:#f8fafc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mode-sel{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px;flex-shrink:0}
.mode-btn{padding:5px 10px;border:none;background:none;color:var(--muted);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.mode-btn.on{background:var(--purple);color:#fff}
.cfg-btn{padding:5px 11px;border:1px solid var(--border);background:var(--bg3);border-radius:9px;color:var(--purplelt);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.cfg-btn:hover{border-color:var(--purple);background:var(--purple);color:#fff}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;max-width:580px;margin:0 auto}
.welcome h1{font-size:24px;font-weight:900;margin-bottom:9px;letter-spacing:-.02em;background:linear-gradient(to right,#fff,var(--purplelt));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.65}
.sug-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:500px}
.sug{text-align:left;padding:11px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:3px}
.sug:hover{border-color:var(--purple);background:var(--bg3);transform:translateY(-1px)}
.sug strong{color:var(--purplelt);display:block}
.sug small{color:var(--muted);font-size:11px}
.sug.full{grid-column:span 2;text-align:center;background:rgba(124,58,237,.05);border-color:rgba(124,58,237,.25);color:var(--purplelt);font-weight:600;align-items:center;padding:12px}
.sug.full:hover{background:rgba(124,58,237,.1);border-color:var(--purple)}
.diversity-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:22px;justify-content:center}
.div-chip{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;border:1px solid;white-space:nowrap}
.div-chip.fast{color:var(--cyan);border-color:rgba(103,232,249,.25);background:rgba(103,232,249,.07)}
.div-chip.value{color:var(--green);border-color:rgba(52,211,153,.25);background:rgba(52,211,153,.07)}
.div-chip.reason{color:var(--amber);border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.07)}
.div-chip.quality{color:var(--purplelt);border-color:rgba(167,139,250,.25);background:rgba(167,139,250,.07)}
.bwrap{display:flex;gap:12px;width:100%;max-width:860px;margin:0 auto;animation:fadeUp .2s cubic-bezier(.16,1,.3,1)}
.bwrap.user{flex-direction:row-reverse}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;border:1px solid rgba(255,255,255,.05)}
.av.ai{background:linear-gradient(135deg,var(--purple),#4c1d95);color:#fff;box-shadow:0 3px 9px rgba(124,58,237,.3)}
.av.user{background:#1e293b;color:#94a3b8}
.bubble{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:13px}
.bwrap.user .bubble{background:var(--bg3);border-color:rgba(124,58,237,.2)}
.bubble.editing{border-color:var(--bfocus);box-shadow:0 0 0 2px rgba(124,58,237,.12)}
.b-top{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.edited-tag{font-size:9px;color:var(--amber);background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);padding:1px 5px;border-radius:3px;font-weight:700}
.b-bot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:9px;border-top:1px solid var(--border)}
.eng-tag{font-size:9px;font-weight:700;color:var(--purplelt);background:rgba(124,58,237,.1);padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em}
.elapsed{font-size:10px;color:var(--dim);font-family:monospace}
.acts{display:flex;gap:4px}
.act{background:none;border:1px solid transparent;color:var(--muted);cursor:pointer;font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;transition:all .1s;font-family:inherit}
.act:hover{color:var(--text);background:var(--bg3);border-color:var(--border)}
.act.ok{color:var(--green);border-color:rgba(52,211,153,.25)}
.streaming-cursor::after{content:'▋';animation:blink .7s infinite;color:var(--purplelt);font-size:13px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* ── PROGRESS ── */
.status-panel{background:#04040a;border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px;display:flex;flex-direction:column;gap:7px}
.st-row{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.st-l{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0}
.dot.active{background:var(--purplelt);box-shadow:0 0 6px var(--purplelt);animation:pulse 1.4s infinite}
.dot.done{background:var(--green)}
.dot.fail{background:var(--red)}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.st-lbl{font-weight:500;color:var(--text);font-size:12px}
.st-lbl.done{color:var(--muted)}
.st-meta{font-size:10px;font-family:monospace;background:var(--bg3);padding:1px 5px;border-radius:3px;color:var(--purplelt);border:1px solid var(--border)}
/* ── SPECIALIST GRID ── */
.spec-grid{display:flex;flex-direction:column;gap:5px;margin-top:7px;padding-top:8px;border-top:1px solid var(--border)}
/* each specialist row is now a column: top row (name+badge), optional preview below */
.spec-row{display:flex;flex-direction:column;gap:2px}
.spec-row-main{display:flex;align-items:center;justify-content:space-between;gap:6px}
.spec-name{font-size:11px;color:var(--text);font-weight:500;display:flex;align-items:center;gap:5px}
.spec-dot{width:5px;height:5px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .3s}
.spec-dot.active{background:var(--purplelt);box-shadow:0 0 5px var(--purplelt);animation:pulse 1.4s infinite}
.spec-dot.done{background:var(--green)}
.spec-dot.fail{background:var(--red)}
.spec-mdl{font-size:10px;font-family:monospace;color:var(--muted);background:var(--bg3);padding:1px 5px;border-radius:3px;border:1px solid var(--border);white-space:nowrap}
/* live thinking preview — shows first ~180 chars of streaming output */
.spec-preview{font-size:10px;color:var(--dim);font-family:monospace;line-height:1.35;
  overflow:hidden;max-height:30px;word-break:break-all;padding-left:10px;
  border-left:2px solid var(--border);margin-left:2px;opacity:.85}
/* ── PROSE ── */
.prose{font-size:14px;line-height:1.7;color:#e2e8f0}
.prose h2{font-size:16px;border-bottom:1px solid var(--border);padding-bottom:4px;color:var(--purplelt);margin:16px 0 8px;font-weight:700}
.prose h3{font-size:14px;color:#fff;margin:12px 0 6px;font-weight:700}
.prose h4{color:#cbd5e1;margin:10px 0 4px;font-weight:600}
.prose p{margin-bottom:10px}
.prose ul,.prose ol{padding-left:19px;margin-bottom:10px}
.prose li{margin-bottom:3px}
.prose code{background:#141424;padding:2px 5px;border-radius:5px;color:#f472b6;font-size:12px;font-family:monospace;border:1px solid rgba(255,255,255,.03)}
.prose pre{background:#04040a;padding:13px;border-radius:9px;overflow-x:auto;margin:10px 0;border:1px solid var(--border)}
.prose pre code{background:none;padding:0;color:#e2e8f0;border:none;font-size:12px}
.prose strong{color:#fff;font-weight:600}
.prose table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
.prose th,.prose td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.prose th{background:var(--bg3);color:#94a3b8;font-weight:600}
.prose blockquote{border-left:3px solid var(--purple);padding-left:12px;color:#94a3b8;font-style:italic;margin:10px 0}
.prose hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.edit-area{width:100%;background:var(--bg);border:1px solid var(--bfocus);border-radius:9px;padding:9px 12px;color:var(--text);font-size:14px;font-family:inherit;resize:vertical;outline:none;min-height:72px;line-height:1.6;margin-bottom:7px}
.edit-acts{display:flex;gap:7px}
.edit-save{background:var(--purple);border:none;border-radius:7px;padding:6px 13px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .1s}
.edit-save:hover{background:#6d28d9}
.edit-cancel{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 12px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .1s}
.edit-cancel:hover{color:var(--text)}
.inputbar{padding:12px 19px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.input-wrap{display:flex;gap:9px;align-items:flex-end;max-width:860px;margin:0 auto}
.input-wrap textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:11px 13px;color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;min-height:56px;max-height:160px;line-height:1.5;transition:border-color .15s}
.input-wrap textarea:focus{border-color:var(--bfocus);box-shadow:0 0 0 2px rgba(124,58,237,.1)}
.send-btn{width:46px;height:46px;background:var(--purple);border:none;border-radius:11px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;box-shadow:0 3px 8px rgba(124,58,237,.2)}
.send-btn:disabled{opacity:.2;cursor:not-allowed;box-shadow:none}
.send-btn:hover:not(:disabled){background:#6d28d9;transform:translateY(-1px)}
.input-hint{text-align:center;font-size:11px;color:var(--dim);margin-top:6px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.83);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:17px;padding:22px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 24px -5px rgba(0,0,0,.5)}
.modal-h{font-size:16px;font-weight:800;color:#fff;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:13px;line-height:1.5}
.fgrp{margin-bottom:11px}
.fgrp label{display:block;font-size:11px;font-weight:700;color:var(--purplelt);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.modal input,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;font-family:inherit}
.modal input:focus,.modal select:focus{border-color:var(--purple)}
.modal-hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.modal-hint.ok{color:var(--green)}
.modal-hint.info{color:var(--cyan)}
.modal-sec{font-size:12px;font-weight:700;color:#fff;margin:15px 0 4px;display:flex;align-items:center;gap:7px}
.modal-sec small{font-size:10px;color:var(--muted);font-weight:400}
.role-desc{font-size:11px;color:var(--dim);margin-bottom:6px;padding-left:2px}
.modal-btns{display:flex;gap:9px;margin-top:17px}
.btn-p{flex:1;background:var(--purple);border:none;border-radius:9px;padding:11px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .1s}
.btn-p:hover{background:#6d28d9}
.btn-s{flex:1;background:var(--bg3);border:none;border-radius:9px;padding:11px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .1s}
.btn-s:hover{color:var(--text)}
.divider{height:1px;background:var(--border);margin:13px 0}
.cost-est{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--muted);line-height:1.6;margin-top:14px}
.cost-est strong{color:var(--purplelt)}
@media(max-width:768px){
  .sb{position:fixed;height:100%;z-index:30}
  .sb.hidden{transform:translateX(-268px)}
  .sb-close{display:block!important}
  .sug-grid{grid-template-columns:1fr}
  .sug.full{grid-column:span 1}
  .topbar{flex-wrap:wrap;gap:7px;padding:9px 13px}
  .top-title{width:calc(100% - 42px)}
  .mode-sel{order:3;width:100%}
  .mode-btn{flex:1;text-align:center}
}
@media(min-width:769px){
  .sb.hidden{transform:none}
  .menu-btn{display:none!important}
}
/* ── FIX 2: COMPARE (blind A/B) ── */
.cmp-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.cmp-card{background:#04040a;border:1px solid var(--border);border-radius:11px;padding:11px;min-width:0;overflow:hidden}
.cmp-head{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.cmp-slot{font-size:12px;font-weight:800;color:#fff;letter-spacing:.04em}
.cmp-src{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em}
.cmp-src.masked{color:var(--muted);background:var(--bg3);border:1px solid var(--border)}
.cmp-src.council{color:var(--purplelt);background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.35)}
.cmp-src.solo{color:var(--cyan);background:rgba(103,232,249,.1);border:1px solid rgba(103,232,249,.3)}
.cmp-wait{font-size:10px;color:var(--amber);margin-left:auto;font-family:monospace}
.cmp-body{font-size:12.5px;line-height:1.55;max-height:420px;overflow-y:auto}
.cmp-body .prose{font-size:12.5px}
.cmp-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px;padding-top:10px;border-top:1px solid var(--border)}
.cmp-q{font-size:12px;font-weight:600;color:var(--text);margin-right:2px}
.cmp-btn{padding:6px 13px;border:1px solid var(--purple);background:rgba(124,58,237,.12);color:var(--purplelt);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s}
.cmp-btn:hover{background:var(--purple);color:#fff}
.cmp-btn.tie{border-color:var(--border);background:var(--bg3);color:var(--muted)}
.cmp-btn.tie:hover{color:var(--text);border-color:var(--muted)}
.cmp-result{font-size:12.5px;font-weight:700;color:var(--green)}
.cmp-tally{margin-top:8px;font-size:11px;color:var(--purplelt);background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.2);border-radius:7px;padding:7px 10px;font-weight:600}
@media(max-width:680px){ .cmp-wrap{grid-template-columns:1fr} }
/* ── FIX 5: second opinion + verified badge ── */

// ── QUALITY TIERS — replaces per-role model config ────────────────────────────

const DEFAULT_TIER   = 'high';
const DEFAULT_MODELS = MODEL_TIERS[DEFAULT_TIER].models;

const ROUTER_MODEL = 'openai/gpt-4o-mini';

const S_EVAL       = 'openorb_eval_v1';
const OR_MODELS    = 'https://openrouter.ai/api/v1/models';

// ── FIX 1: MODEL VALIDATION + FALLBACKS ─────────────────────────────────────────
// Each preferred model maps to an ordered list of real-world alternates. At runtime
// we keep only models OpenRouter actually serves; anything missing is swapped for the
// first live alternate. Last resort is a near-universal cheap anchor. This stops the
// app silently breaking when a slug in the registry isn't live.
const UNIVERSAL_FALLBACKS = ['openai/gpt-4o-mini', 'openai/gpt-4o', 'anthropic/claude-3.5-sonnet'];
const MODEL_FALLBACKS = {
  'anthropic/claude-opus-4.8':     ['anthropic/claude-opus-4.1', 'anthropic/claude-3.7-sonnet', 'anthropic/claude-3.5-sonnet', 'openai/gpt-4o'],

  'anthropic/claude-haiku-4.5':    ['anthropic/claude-3.5-haiku', 'anthropic/claude-3-haiku', 'openai/gpt-4o-mini'],
  'openai/gpt-5.5':                ['openai/gpt-4o', 'openai/gpt-4-turbo', 'anthropic/claude-3.5-sonnet'],
  'google/gemini-3.1-pro-preview': ['google/gemini-pro-1.5', 'google/gemini-flash-1.5', 'openai/gpt-4o'],
  'x-ai/grok-4.3':                 ['x-ai/grok-2-1212', 'x-ai/grok-2', 'anthropic/claude-3.5-sonnet', 'openai/gpt-4o'],
  'deepseek/deepseek-v4-pro':      ['deepseek/deepseek-chat', 'deepseek/deepseek-r1', 'openai/gpt-4o-mini'],
  'deepseek/deepseek-v4-flash':    ['deepseek/deepseek-chat', 'openai/gpt-4o-mini'],
  'deepseek/deepseek-r1':          ['deepseek/deepseek-chat', 'openai/gpt-4o-mini'],
  'moonshotai/kimi-k2.5':          ['moonshotai/kimi-k2', 'deepseek/deepseek-chat', 'openai/gpt-4o-mini'],
  'qwen/qwen3.6-max-preview':      ['qwen/qwen-2.5-72b-instruct', 'deepseek/deepseek-chat', 'openai/gpt-4o-mini'],
  'openai/gpt-4o-mini':            ['openai/gpt-3.5-turbo'],
};

// Resolve a model id against the live set. validSet null/empty → don't touch (no data yet).
const resolveModelId = (id, validSet) => {
  if (!validSet || validSet.size === 0) return id;
  if (validSet.has(id)) return id;
  for (const alt of (MODEL_FALLBACKS[id] || [])) if (validSet.has(alt)) return alt;
  for (const anchor of UNIVERSAL_FALLBACKS) if (validSet.has(anchor)) return anchor;
  return id; // nothing live — return original so the error is visible, not silent
};

// Fetch the set of model ids OpenRouter is actually serving. Returns null on failure.
const fetchValidModels = async (key) => {
  try {
    const r = await fetch(OR_MODELS, { headers: key ? { 'Authorization': `Bearer ${key}` } : {} });
    if (!r.ok) return null;
    const data = await r.json();
    const ids = (data.data || data.models || []).map(m => m.id).filter(Boolean);
    return ids.length ? new Set(ids) : null;
  } catch (_) { return null; }
};

// ── FIX 3: AUTO-TIER ────────────────────────────────────────────────────────────

const TIER_RANK = { low: 0, medium: 1, high: 2 };
const tierForComplexity = (c) => c === 'hard' ? 'high' : c === 'moderate' ? 'medium' : 'low';
const capTier = (want, ceiling) => (TIER_RANK[want] <= TIER_RANK[ceiling] ? want : ceiling);

const ROUTER_PROMPT = `You are the Question Disturber & Architecture Router.

skip_masters: roles not needed. Options: "logician","architect","debugger","adversary","strategist". Max 2. Default [].
requires_web_search: true ONLY if question needs current prices, live APIs, recent events, latest library versions, real-time data.
search_query: optimized query string if requires_web_search true, else "".
complexity: "simple" = conversational, factual, definitions — one good model is enough.

const CONFLICT_EXTRACT_PROMPT = `You extract specific points of DISAGREEMENT between expert analyses.
You are given several specialist analyses on the same question. Output a TIGHT list of the substantive conflicts — places where the experts contradict each other on facts, approach, correctness, or safety.

const DEVIL_ADVOCATE_PROMPT = `You are the Red Team adversary. The other specialists all AGREED on this question — which is suspicious.
Your job: find the most likely way that consensus is wrong. Specifically look for:

// ── UTILITIES ──────────────────────────────────────────────────────────────────
const parseSeverity = (text) => {
  if (!text) return { severe: 0, warn: 0, correct: 0 };
  return {
    severe:  (text.match(/\[SEVERE\]/gi)  || []).length,
    warn:    (text.match(/\[WARN\]/gi)    || []).length,
    correct: (text.match(/\[CORRECT\]/gi) || []).length,
  };
};

// NEW: pull individual tagged claims out of a specialist's Round 2 output.
// Each cross-exam tag — [SEVERE]/[WARN]/[CORRECT]/[SKIP] — fires on a peer assertion;
// we grab the surrounding ~250 chars so the heatmap UI can show what was being judged.
const parseTaggedClaims = (text) => {
  if (!text) return [];
  const out = [];
  const re = /\[(SEVERE|WARN|CORRECT|SKIP)\]/gi;
  let m;
  while ((m = re.exec(text)) !== null) {
    const tag = m[1].toUpperCase();
    const start = m.index + m[0].length;
    // Snippet = up to next tag or 250 chars
    re.lastIndex = start;
    const nextHit = re.exec(text);
    const end = nextHit ? Math.min(nextHit.index, start + 250) : Math.min(text.length, start + 250);
    re.lastIndex = start; // reset so the outer loop continues normally
    let snippet = text.slice(start, end).replace(/^[\s:—–-]+/, '').trim();
    snippet = snippet.replace(/\n+/g, ' ').slice(0, 220);
    if (snippet) out.push({ tag, snippet });
  }
  return out;
};

const shortModel = (id) => {
  const name = (id || '').split('/')[1] || id;
  return name.replace(/-(instruct|it|latest|001)$/, '').replace(/:.*$/, '');

// ── NEW FEATURE 1: CONFIDENCE METER ─────────────────────────────────────────────
// Calculates 0–100 from specialist agreement/disagreement. Higher = more consensus.
const calcConfidence = (r1ok, r2ok, consensusSkipped, devilFound) => {
  const n = r1ok.length;
  if (n < 2) return 95; // single specialist → high confidence by default

  let score = 80; // base: having multiple specialists is inherently decent

  if (consensusSkipped) {
    score += 12; // all agreed without argument → strong signal
    if (devilFound) score -= 8; // devil's advocate raised concerns
  } else if (r2ok && r2ok.length > 0) {
    // Parse tags across all Round 2 outputs
    let totalSevere = 0, totalWarn = 0, totalCorrect = 0;
    r2ok.forEach(r => {
      const p = parseSeverity(r.content || '');
      totalSevere += p.severe; totalWarn += p.warn; totalCorrect += p.correct;
    });
    score += totalCorrect * 3;   // each agreement boosts
    score -= totalSevere * 8;    // each severe conflict drops hard
    score -= totalWarn * 3;      // warnings drop moderately
  }

  return Math.max(15, Math.min(99, Math.round(score)));
};

const callOR = async (key, model, messages, maxTokens = 1200, temp = 0.1) => {
  const r = await fetch(OR_BASE, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json',
      'HTTP-Referer': 'https://openorb.ai', 'X-Title': 'OpenOrb.ai' },
    body: JSON.stringify({ model, messages, max_tokens: maxTokens, temperature: temp })
  });
  if (!r.ok) {
    let msg = `HTTP ${r.status}`;
    try { const e = await r.json(); msg = e.error?.message || e.message || msg; } catch (_) {}
    throw new Error(msg);
  }
  const data = await r.json();
  const content = data.choices?.[0]?.message?.content;
  if (!content) throw new Error(`Model "${shortModel(model)}" returned empty response`);
  return content;
};

// Streaming call. onToken(fullAccumulatedText) fires as chunks arrive.
// Returns final full text. Throws if stream is empty or HTTP error.
const callORStream = async (key, model, messages, onToken, maxTokens = 1200, temp = 0.4, extra) => {
  const r = await fetch(OR_BASE, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json',
      'HTTP-Referer': 'https://openorb.ai', 'X-Title': 'OpenOrb.ai' },
    body: JSON.stringify({ model, messages, max_tokens: maxTokens, temperature: temp, stream: true, ...(extra || {}) })
  });
  if (!r.ok) {
    let msg = `HTTP ${r.status}`;
    try { const e = await r.json(); msg = e.error?.message || e.message || msg; } catch (_) {}
    throw new Error(msg);
  }
  const reader = r.body.getReader();
  const dec = new TextDecoder();
  let full = '', buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6);
      if (d === '[DONE]') continue;
      try {
        const tok = JSON.parse(d).choices?.[0]?.delta?.content || '';
        if (tok) { full += tok; onToken(full); }
      } catch (_) {}
    }
  }
  if (!full) throw new Error(`Model "${shortModel(model)}" returned empty stream`);
  return full;
};

const tavilySearch = async (key, query) => {
  if (!key || !query?.trim()) return null;
  try {
    const r = await fetch(TAVILY_BASE, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify({ query: query.trim(), search_depth: 'basic', max_results: 3 })
    });
    if (!r.ok) return null;
    const res = await r.json();
    if (!res.results?.length) return null;
    // Hard cap at 3000 chars — 5 specialists × 3000 = 15K extra chars max
    return res.results.map(i => `[${i.title}]\n${i.content}`).join('\n\n').slice(0, 3000);
  } catch (_) { return null; }
};

const runRouter = async (key, prompt, prevCtx = '') => {
  let plan = {};
  const input = prevCtx ? `CONVERSATION HISTORY:\n${prevCtx}\n\nCURRENT QUESTION:\n${prompt}` : prompt;
  try {
    const raw = await callOR(key, ROUTER_MODEL,
      [{ role: 'system', content: ROUTER_PROMPT }, { role: 'user', content: input }],
      600, 0.0
    );
    plan = JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch (_) {}
  const rawSkip  = Array.isArray(plan.skip_masters) ? plan.skip_masters : [];
  const safeSkip = rawSkip.map(s => String(s).toLowerCase().trim()).filter(k => SPEC_KEYS.includes(k)).slice(0, 2);
  const active   = SPEC_KEYS.filter(k => !safeSkip.includes(k));
  const keys     = active.length >= 3 ? active : SPEC_KEYS;
  return {
    plan, keys, safeSkip,
    requiresWebSearch: plan.requires_web_search === true || plan.requires_web_search === 'true',
    searchQuery:       typeof plan.search_query === 'string' ? plan.search_query.trim() : '',
    complexity:        ['simple','moderate','hard'].includes(plan.complexity) ? plan.complexity : 'moderate',
  };
};

// Summarise the last 4 exchanges (8 msgs) into one compact context paragraph.
// Uses ROUTER_MODEL (cheap, fast). Returns '' on any failure — safe degradation.
const summariseHistory = async (key, chain) => {
  const msgs = chain
    .slice(0, -1)  // exclude the current user message
    .filter(m => (m.role === 'user' || m.role === 'assistant') && m.content?.trim())
    .slice(-8)     // last 4 exchanges
    .map(m => `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content.slice(0, 500)}`);
  if (msgs.length < 3) return '';
  try {
    return (await callOR(key, ROUTER_MODEL,
      [{ role: 'system', content: SUMMARY_PROMPT }, { role: 'user', content: msgs.join('\n\n') }],
      250, 0.0
    )).trim();
  } catch (_) { return ''; }
};

// FIX 4: cheap conflict check on Round-1 outputs. true = specialists disagree (run
// cross-exam), false = they agree (skip it). On any failure, default true (safe).
const checkConsensus = async (key, prompt, r1ok) => {
  if (r1ok.length < 2) return false;
  try {
    const body = r1ok.map(r => `### ${r.name}\n${(r.content || '').slice(0, 800)}`).join('\n\n');
    const raw = await callOR(key, ROUTER_MODEL,
      [{ role: 'system', content: CONSENSUS_PROMPT },
       { role: 'user', content: `QUESTION:\n${prompt}\n\nSPECIALIST ANALYSES:\n${body}` }],
      80, 0.0
    );
    const j = JSON.parse(raw.replace(/```json|```/g, '').trim());
    return j.conflict === true || j.conflict === 'true';
  } catch (_) { return true; }
};

// NEW: extract only the points of disagreement from Round 1 outputs. The cheap
// router model writes a short conflict list that we send to specialists in Round 2,
// replacing the full peer-essay dump. Returns '' on failure (caller falls back).
const extractConflicts = async (key, r1ok) => {
  if (r1ok.length < 2) return '';
  try {
    const body = r1ok.map(r => `### ${r.name}\n${(r.content || '').slice(0, 1400)}`).join('\n\n');
    const raw = await callOR(key, ROUTER_MODEL,
      [{ role: 'system', content: CONFLICT_EXTRACT_PROMPT }, { role: 'user', content: body }],
      400, 0.0
    );
    const txt = (raw || '').trim();
    if (!txt || /^NO_MATERIAL_CONFLICTS\s*$/i.test(txt)) return '';
    return txt;
  } catch (_) { return ''; }
};

function genIcon(size) {
  try {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const x = c.getContext('2d'), r = size * 0.18, s = size;
    x.fillStyle = '#7c3aed';
    x.beginPath();
    x.moveTo(r,0); x.lineTo(s-r,0); x.arcTo(s,0,s,r,r);
    x.lineTo(s,s-r); x.arcTo(s,s,s-r,s,r);
    x.lineTo(r,s); x.arcTo(0,s,0,s-r,r);
    x.lineTo(0,r); x.arcTo(0,0,r,0,r);
    x.closePath(); x.fill();
    x.fillStyle = 'rgba(255,255,255,.95)';
    x.beginPath();
    x.moveTo(s*.58,s*.10); x.lineTo(s*.35,s*.52); x.lineTo(s*.50,s*.52);
    x.lineTo(s*.42,s*.90); x.lineTo(s*.65,s*.48); x.lineTo(s*.50,s*.48);
    x.closePath(); x.fill();
    return c.toDataURL('image/png');
  } catch (_) { return null; }
}

      try { document.execCommand('copy'); } catch (_) {}
      document.body.removeChild(t);
    };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text)
        .then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); })
        .catch(() => { fb(); setCopied(true); setTimeout(() => setCopied(false), 1500); });
