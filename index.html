          <div class="edit-acts">
            <button class="edit-save" onClick=${onEditSave}>✓ Save & Rerun</button>
            <button class="edit-cancel" onClick=${onEditCancel}>✗ Cancel</button>
          </div>` : html`
          ${msg.engineMode === 'compare' && msg.compare ? html`
            <div class="cmp-wrap">
              ${msg.compare.items.map(it => html`
                <div class="cmp-card" key=${it.slot}>
                  <div class="cmp-head">
                    <span class="cmp-slot">Answer ${it.slot}</span>
                    ${revealed
                      ? html`<span class=${`cmp-src ${it.src}`}>${it.src === 'council' ? '🔮 Council' : '🤖 Single model'}</span>`
                      : html`<span class="cmp-src masked">identity hidden</span>`}
                    ${!it.done && html`<span class="cmp-wait">⏳ working…</span>`}
                  </div>
                  <div class="cmp-body">
                    ${it.content
                      ? html`<${Markdown} text=${it.content}/>`
                      : html`<span style="color:var(--dim);font-size:12px">Waiting for output…</span>`}
                  </div>
                </div>`)}
            </div>
            ${msg.compare.items.every(it => it.done) && html`
              <div class="cmp-actions">
                ${!revealed ? html`
                  <span class="cmp-q">Read both blind — which is better?</span>
                  <button class="cmp-btn" onClick=${() => recordPick('A')}>A is better</button>
                  <button class="cmp-btn" onClick=${() => recordPick('B')}>B is better</button>
                  <button class="cmp-btn tie" onClick=${() => recordPick('tie')}>Tie</button>
                ` : html`<span class="cmp-result">${pickNote}</span>`}
              </div>`}
            ${revealed && tallyNote && html`<div class="cmp-tally">📊 ${tallyNote}</div>`}
          ` : html`
            ${msg.content && (isUser
              ? html`<p style="white-space:pre-wrap;font-size:14px;line-height:1.6">${msg.content}</p>`
              : html`<div class=${msg.streaming ? 'streaming-cursor' : ''}><${Markdown} text=${msg.content}/></div>`
            )}
            ${!isUser && msg.secondOpinion && html`
              <div class="second-op">⚠️ <strong>Second-opinion note:</strong> ${msg.secondOpinion}</div>`}
          `}`}
        ${showFoot && html`
          ${!isUser && msg.autoReason && html`<div class="auto-reason">🤖 ${msg.autoReason}</div>`}
          ${!isUser && msg.confidence && msg.confidence > 0 && !msg.streaming && html`
            <div class="conf-wrap">
              <span class="conf-label">Confidence</span>
              <div class="conf-track">
                <div class="conf-fill" style=${`width:${msg.confidence}%;background:${
                  msg.confidence >= 85 ? 'var(--green)' : msg.confidence >= 65 ? 'var(--amber)' : 'var(--red)'
                }`}></div>
              </div>
              <span class=${`conf-pct ${msg.confidence >= 85 ? 'hi' : msg.confidence >= 65 ? 'mid' : 'lo'}`}>${msg.confidence}%</span>
            </div>`}
          <div class="b-bot">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              ${!isUser && msg.engineMode === 'council' && html`<span class="eng-tag">Council DAG</span>`}
              ${!isUser && msg.engineMode === 'fusion'  && msg.content && html`<span class="eng-tag">⚡ Fusion</span>`}
              ${!isUser && msg.engineMode === 'strike'  && msg.content && html`<span class="eng-tag" style="background:rgba(251,191,36,.1);color:var(--amber);border-color:rgba(251,191,36,.2)">⚡ Strike</span>`}
              ${!isUser && msg.engineMode === 'compare' && html`<span class="eng-tag" style="background:rgba(103,232,249,.1);color:var(--cyan);border-color:rgba(103,232,249,.25)">⚖️ Compare</span>`}
              ${!isUser && msg.tierLabel && msg.engineMode !== 'fusion' && html`<span class="tier-chip">${msg.tierLabel}</span>`}
              ${!isUser && msg.verified && html`<span class="verif-badge">✓ double-checked</span>`}
              ${msg.elapsed && html`<span class="elapsed">${msg.elapsed}s</span>`}
              ${!isUser && msg.cost > 0 && html`<span class="cost-chip">$${msg.cost < 0.01 ? msg.cost.toFixed(4) : msg.cost.toFixed(3)}</span>`}
            </div>
            <div class="acts">
              ${isUser && !loading && html`<button class="act" onClick=${() => onEditStart(msg.id)}>✏ Edit</button>`}
              ${msg.content && html`
                <button class=${`act${copied ? ' ok' : ''}`} onClick=${() => copy(msg.content)}>
                  ${copied ? '✓ Copied' : '⎘ Copy'}
                </button>`}
            </div>
          </div>`}
      </div>
    </div>`;
}

function Sidebar({ chats, activeId, onSelect, onNew, visible, onClose, onConfig }) {
  return html`
    <div>
      <div class=${`sb-overlay${visible ? ' show' : ''}`} onClick=${onClose}></div>
      <aside class=${`sb${visible ? '' : ' hidden'}`}>
        <div class="sb-head">
          <div class="sb-logo">⚡ OpenOrb.ai <span class="sb-badge">v5</span></div>
          <button class="sb-close" onClick=${onClose}>×</button>
        </div>
        <button class="sb-new" onClick=${onNew}><span>New Session</span><span style="opacity:.5">+</span></button>
        <div class="sb-list">
          <div class="sb-sec">History</div>
          ${chats.length === 0 && html`<p style="font-size:11px;color:var(--muted);text-align:center;margin-top:12px">No sessions yet.</p>`}
          ${chats.map(c => html`
            <button key=${c.id} class=${`sb-item${c.id === activeId ? ' active' : ''}`}
              onClick=${() => { onSelect(c); onClose(); }}>${c.title || 'Untitled Thread'}</button>`)}
        </div>
        <button class="sb-cfg" onClick=${() => { onConfig(); onClose(); }}>🔑 Config & API Keys</button>
        <div class="sb-foot">Keys stored in your browser only</div>
      </aside>
    </div>`;
}

const MODE_DESC = {
  auto:    'Routes your question to the right engine automatically',
  quick:   'Single fast AI — best for simple, direct questions',
  council: '5 specialist AIs debate, then a judge synthesizes the answer',
  compare: 'Council vs single model, blind — you decide which wins',
};

// ── MAIN APP ───────────────────────────────────────────────────────────────────
const DEMO = `[COUNCIL CHALLENGE]
Build a TypeScript telemetry synchronization pipeline:
1. Accept streaming frames with microsecond timestamps.
2. Invariant: No processed frame timestamp can be less than its predecessor.
3. Constraint: Memory allocations capped dynamically at 40MB inside an isolate.
Deliberately include a race hazard and an off-by-one memory leak. Have the council find and fix both.`;

function App() {
  const [chats,   setChats]   = useState(() => { try { return JSON.parse(localStorage.getItem(S_CHATS)||'[]'); } catch(_){ return []; } });
  const [chatId,  setChatId]  = useState(null);
  const [msgs,    setMsgs]    = useState([]);
  const [input,   setInput]   = useState('');
  const [loading, setLoading] = useState(false);
  const [mode,    setMode]    = useState('auto');
  const [showCfg, setShowCfg] = useState(false);
  const [sbOpen,  setSbOpen]  = useState(false);
  const [editId,  setEditId]  = useState(null);
  const [editTxt, setEditTxt] = useState('');
  const [modelStatus, setModelStatus] = useState({ checked: false, remaps: [], missing: [] });

  // PWA install state
  const [showInstall, setShowInstall] = useState(false);
  const [showInstModal, setShowInstModal] = useState(false);
  const deferRef = useRef(null);
  const iosRef   = useRef(false);
  const [modeChanged, setModeChanged] = useState(false);

  const handleModeChange = (m) => {
    setMode(m);
    setModeChanged(true);
    setTimeout(() => setModeChanged(false), 450);
  };

  const handleInstall = async () => {
    if (deferRef.current) {
      deferRef.current.prompt();
      try { await deferRef.current.userChoice; } catch (_) {}
      deferRef.current = null;
      setShowInstall(false);
      return;
    }
    setShowInstModal(true);
  };

  const [config, setConfig] = useState(() => {
    try {
      const raw = localStorage.getItem(S_CONFIG);
      if (raw) {
        const p    = JSON.parse(raw);
        const tier = (p.tier && MODEL_TIERS[p.tier]) ? p.tier : DEFAULT_TIER;
        return { ...DEFAULT_CONFIG, ...p,
          openRouterKey: p.openRouterKey || p.groqKey || '',
          tavilyKey:     p.tavilyKey || '',
          tier,
          models: { ...MODEL_TIERS[tier].models } };
      }
    } catch (_) {}
    return { ...DEFAULT_CONFIG, models: { ...DEFAULT_MODELS } };
  });

  // FIX 1: live model set + FIX 3: tier chosen for the current run. Refs avoid stale closures.
  const modelSetRef = useRef(null);
  const runTierRef  = useRef(config.tier || DEFAULT_TIER);

  // FIX 1: on mount and whenever the key changes, fetch the real model list and record
  // which configured models had to be swapped — surfaced to the user, not hidden.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const set = await fetchValidModels(config.openRouterKey);
      if (cancelled || !set) return;
      modelSetRef.current = set;
      // Compute remaps across every role in every tier so the warning is complete.
      const seen = {}, remaps = [], missing = [];
      Object.values(MODEL_TIERS).forEach(t => Object.values(t.models).forEach(id => {
        if (seen[id]) return; seen[id] = 1;
        if (!set.has(id)) {
          const to = resolveModelId(id, set);
          missing.push(id);
          if (to !== id) remaps.push({ from: id, to });
        }
      }));
      setModelStatus({ checked: true, remaps, missing });
    })();
    return () => { cancelled = true; };
  }, [config.openRouterKey]);

  // FIX 1 + FIX 3: resolve a role to a real model, using the tier picked for this run.
  const pickModel = (role) => {
    const tier = runTierRef.current || config.tier || DEFAULT_TIER;
    const base = (MODEL_TIERS[tier] && MODEL_TIERS[tier].models[role]) || DEFAULT_MODELS[role];
    return resolveModelId(base, modelSetRef.current);
  };

  const scrollRef = useRef(null);

  // NEW FEATURE 2: live cost counter. Ref accumulates estimated cost; helper pushes to msg.
  const costRef = useRef(0);
  const addCost = (aid, modelId, approxTokens) => {
    const c = estCallCost(modelId, approxTokens);
    costRef.current += c;
    const rounded = costRef.current;
    setMsgs(p => p.map(m => m.id === aid ? { ...m, cost: rounded } : m));
  };
  const taRef     = useRef(null);

  useEffect(() => { localStorage.setItem(S_CONFIG, JSON.stringify(config)); }, [config]);
  useEffect(() => { localStorage.setItem(S_CHATS, JSON.stringify(chats.slice(0, 20))); }, [chats]);
  useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);
  useEffect(() => { if (!config.openRouterKey) setShowCfg(true); }, []);

  useEffect(() => {
    // PWA: register service worker
    if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
      navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW failed:', err));
    }

    // PWA: capture install prompt — store it whenever it fires (early or late)
    if (globalDefer) {
      deferRef.current = globalDefer;
    }
    const handler = (e) => { e.preventDefault(); deferRef.current = e; };
    window.addEventListener('beforeinstallprompt', handler);

    // Always show the button on Android/iOS when not already installed as PWA
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isAndroid = /Android/.test(navigator.userAgent);
    const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (!standalone && (isIOS || isAndroid)) {
      setShowInstall(true);
      if (isIOS) iosRef.current = true;
    }

    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  // ── COUNCIL ENGINE ──────────────────────────────────────────────────────────
  // precomputed: result from runRouter (auto mode) or null (explicit council mode).
  //   When null, runCouncil calls runRouter + summariseHistory in parallel internally.
  // prevCtx: last 2 truncated user messages for router context.
  // chain: full message history for summarisation.

  const runCouncil = async (prompt, aid, precomputed, prevCtx, chain, allowSkip = false) => {
    const K = config.openRouterKey;

    const track = (key, state, label, meta) => {
      setMsgs(p => p.map(m => {
        if (m.id !== aid) return m;
        const exists = m.steps.some(s => s.key === key);
        const steps = exists
          ? m.steps.map(s => s.key !== key ? s : { ...s, state, ...(label?{label}:{}), ...(meta?{meta}:{}) })
          // Step wasn't pre-declared (e.g. web search needed but no Tavily key was
          // configured at INIT_STEPS time) — inject it now so the status is visible
          // instead of silently vanishing. Insert right after 'router'.
          : (() => {
              const idx = m.steps.findIndex(s => s.key === 'router');
              const next = [...m.steps];
              next.splice(idx + 1, 0, { key, label: label || key, state, meta: meta || '' });
              return next;
            })();
        return { ...m, steps };
      }));
    };

    const trackSpec = (updates) => {
      setMsgs(p => p.map(m => m.id !== aid ? m : {
        ...m, specialists: (m.specialists||[]).map(s => {
          const u = updates.find(x => x.id === s.id);
          return u ? { ...s, ...u } : s;
        })
      }));
    };

    // ── 1. Router + history summary (parallel) ─────────────────────────────
    track('router', 'active', 'Question Disturber + history summary...');

    const hasHistory = chain.slice(0, -1).filter(m => m.role === 'user' && m.content?.trim()).length >= 2;
    let plan, keys, safeSkip, requiresWebSearch, searchQuery, historySummary;

    if (precomputed) {
      ({ plan, keys, safeSkip, requiresWebSearch, searchQuery } = precomputed);
      historySummary = precomputed.historySummary || '';
    } else {
      // Explicit council mode: run router + summary in parallel — zero added latency
      const [routed, summary] = await Promise.all([
        runRouter(K, prompt, prevCtx),
        hasHistory ? summariseHistory(K, chain) : Promise.resolve('')
      ]);
      ({ plan, keys, safeSkip, requiresWebSearch, searchQuery } = routed);
      historySummary = summary;
    }

    if (historySummary) {
      setMsgs(p => p.map(m => m.id === aid ? { ...m, hasSummary: true } : m));
    }

    const note = safeSkip.length ? ` · skip: ${safeSkip.join(', ')}` : '';
    const ctxNote = historySummary ? ' · ctx✓' : '';
    track('router', 'done', `${keys.length}/5 active${note}${ctxNote}`, 'ROUTED');
    trackSpec(SPEC_KEYS.map(k => ({ id: k, state: keys.includes(k) ? 'active' : 'dim', preview: '' })));

    // Build shared prompt headers
    const contextHeader = historySummary ? `CONVERSATION CONTEXT:\n${historySummary}\n\n` : '';

    // ── 2. Web search ─────────────────────────────────────────────────────────
    let webContext = '', didWebSearch = false;
    if (requiresWebSearch && searchQuery && config.tavilyKey) {
      track('web', 'active', `Web search: "${searchQuery.slice(0,50)}"...`);
      const result = await tavilySearch(config.tavilyKey, searchQuery);
      if (result) {
        webContext = result; didWebSearch = true;
        track('web', 'done', 'Live web data integrated.', 'WEB_OK');
      } else {
        track('web', 'fail', 'Search returned no results.', 'SKIP');
      }
    } else if (requiresWebSearch && !config.tavilyKey) {
      track('web', 'fail', 'Web search needed — add a free Tavily key in Config to enable this.', 'NO_KEY');
    }
    if (didWebSearch) setMsgs(p => p.map(m => m.id === aid ? { ...m, webSearch: true } : m));
    const webHeader = webContext ? `LIVE WEB CONTEXT:\n${webContext}\n\n` : '';

    // ── 3. Round 1 — streaming specialists in parallel ────────────────────────
    // ONE shared previewBuf flushed via ONE setInterval every 150ms.
    // Max 7 setMsgs/sec regardless of specialist count — mobile-safe.
    track('round1', 'active', `${keys.length} specialists streaming in parallel...`);
    const previewBuf = {};
    let previewTimer = setInterval(() => {
      const entries = Object.entries(previewBuf);
      if (!entries.length) return;
      setMsgs(p => p.map(m => m.id !== aid ? m : {
        ...m, specialists: (m.specialists||[]).map(s => {
          const found = previewBuf[s.id];
          return found !== undefined ? { ...s, preview: found } : s;
        })
      }));
    }, 150);

    const r1 = await Promise.all(keys.map(async key => {
      const spec  = SPECIALISTS[key];
      const model = pickModel(key);
      const dir   = plan[`${key}_directive`] || `Analyze from your perspective as ${spec.name}.`;
      const userMsg = `${contextHeader}${webHeader}CURRENT REQUEST:\n${prompt}\n\nYOUR DIRECTIVE:\n${dir}`;
      try {
        const content = await callORStream(K, model,
          [{ role: 'system', content: spec.persona }, { role: 'user', content: userMsg }],
          (partial) => { previewBuf[key] = partial.slice(0, 180); },
          1400, 0.1
        );
        delete previewBuf[key];  // stop timer re-applying stale entry for this specialist
        trackSpec([{ id: key, state: 'done', preview: '' }]);
        return { id: key, name: spec.name, content, ok: true };
      } catch (_) {
        // Stream failed — fall back to non-streamed callOR
        try {
          const content = await callOR(K, model,
            [{ role: 'system', content: spec.persona }, { role: 'user', content: userMsg }],
            1400, 0.1
          );
          delete previewBuf[key];
          trackSpec([{ id: key, state: 'done', preview: '' }]);
          return { id: key, name: spec.name, content, ok: true };
        } catch (e) {
          delete previewBuf[key];
          trackSpec([{ id: key, state: 'fail', preview: '' }]);
          return { id: key, name: spec.name, content: `Error: ${e.message}`, ok: false };
        }
      }
    }));

    clearInterval(previewTimer);
    // Final flush: clear any residual previews
    setMsgs(p => p.map(m => m.id !== aid ? m : {
      ...m, specialists: (m.specialists||[]).map(s => ({ ...s, preview: '' }))
    }));
    track('round1', 'done', 'Round 1 complete.', 'R1_DONE');

    // FEATURE 2: live cost — Round 1 specialists
    const okR1 = r1.filter(r => r.ok);
    okR1.forEach(r => {
      const model = pickModel(r.id);
      addCost(aid, model, 1800); // ~400 input + ~1400 output
    });
    addCost(aid, ROUTER_MODEL, 400); // router + summary calls

    // ── 4. FIX 4: Consensus gate — skip cross-exam when specialists agree ──────
    // allowSkip is true only in Auto mode. Explicit Council and Compare always run
    // the full adversarial pass (the user asked for the works).
    track('severity', 'active', 'Checking specialist consensus...');
    const conflict = allowSkip ? await checkConsensus(K, prompt, okR1) : true;
    addCost(aid, ROUTER_MODEL, 200); // consensus check

    let r2, totalSevere = 0, critNote = '', devilNote = '';

    if (!conflict) {
      // Agreement → skip Round 2. But hedge with a single Red Team devil's-advocate
      // pass, in case all specialists share the same blind spot.
      track('severity', 'done', 'Consensus reached — running devil\'s advocate.', 'CONSENSUS');
      try {
        const redKey   = 'red_team';
        const redModel = pickModel(redKey);
        const consensusBody = okR1.map(r => `### ${r.name}\n${(r.content || '').slice(0, 1200)}`).join('\n\n');
        const daText = await callOR(K, redModel,
          [{ role: 'system', content: SPECIALISTS[redKey] ? SPECIALISTS[redKey].persona : DEVIL_ADVOCATE_PROMPT },
           { role: 'user', content: `${DEVIL_ADVOCATE_PROMPT}\n\nQUESTION:\n${prompt}\n\nUNANIMOUS SPECIALIST ANALYSES:\n${consensusBody}` }],
          600, 0.3
        );
        const trimmed = (daText || '').trim();
        if (trimmed && !/^CONSENSUS_HOLDS\s*$/i.test(trimmed)) {
          devilNote = `\n\n⚠️ DEVIL'S ADVOCATE CHALLENGE (consensus pass — verify these before trusting):\n${trimmed}\n`;
          track('round2', 'done', 'Skipped — but devil\'s advocate raised concerns.', 'CHALLENGED');
        } else {
          track('round2', 'done', 'Skipped — devil\'s advocate found nothing.', 'CONSENSUS_HELD');
        }
      } catch (_) {
        track('round2', 'done', 'Skipped — specialists agree.', 'SKIPPED');
      }
      addCost(aid, pickModel('adversary'), 800); // devil's advocate call
      r2 = r1;
    } else {
      track('severity', 'done', allowSkip ? 'Conflicts found — cross-examining.' : 'Gate open.', 'GATE_OPEN');

      // NEW: token-light Round 2 — extract just the disagreements once (cheap), then
      // hand each specialist that conflict list instead of every peer essay.
      // Falls back to full peer text if the extractor fails or returns nothing.
      const conflictDigest = await extractConflicts(K, okR1);
      const usingDigest = !!conflictDigest;

      // ── 5. Round 2 — streaming cross-examination ────────────────────────────
      track('round2', 'active',
        usingDigest ? 'Cross-exam streaming (conflict digest)...' : 'Adversarial cross-examination streaming...');
      trackSpec(okR1.map(r => ({ id: r.id, state: 'active', preview: '' })));

      const previewBuf2 = {};
      let previewTimer2 = setInterval(() => {
        const entries = Object.entries(previewBuf2);
        if (!entries.length) return;
        setMsgs(p => p.map(m => m.id !== aid ? m : {
          ...m, specialists: (m.specialists||[]).map(s => {
            const found = previewBuf2[s.id];
            return found !== undefined ? { ...s, preview: found } : s;
          })
        }));
      }, 150);

      r2 = await Promise.all(r1.map(async cur => {
        if (!cur.ok) return cur;
        const model   = pickModel(cur.id);
        // If we have a digest, send only the conflict bullets. Otherwise fall back to full peers.
        const peerSection = usingDigest
          ? `CONFLICT POINTS RAISED BY THE PANEL:\n${conflictDigest}`
          : `PEER ANALYSES:\n${r1.filter(p => p.id !== cur.id && p.ok).map(p => `### ${p.name}\n${p.content}`).join('\n\n---\n\n')}`;
        const xPrompt = `${contextHeader}ORIGINAL REQUEST:\n${prompt}\n\n` +
          `YOUR ROUND 1 ANALYSIS:\n${cur.content}\n\n` +
          `${peerSection}\n\n` +
          `CROSS-EXAMINATION: For each conflict above, tag your position with [SEVERE], [WARN], [CORRECT], or [SKIP].\n` +
          `Then output your REVISED FINAL POSITION.`;
        try {
          const content = await callORStream(K, model,
            [{ role: 'system', content: SPECIALISTS[cur.id].persona }, { role: 'user', content: xPrompt }],
            (partial) => { previewBuf2[cur.id] = partial.slice(0, 180); },
            1400, 0.2
          );
          delete previewBuf2[cur.id];
          trackSpec([{ id: cur.id, state: 'done', preview: '' }]);
          return { id: cur.id, name: cur.name, content, ok: true };
        } catch (_) {
          try {
            const content = await callOR(K, model,
              [{ role: 'system', content: SPECIALISTS[cur.id].persona }, { role: 'user', content: xPrompt }],
              1400, 0.2
            );
            delete previewBuf2[cur.id];
            trackSpec([{ id: cur.id, state: 'done', preview: '' }]);
            return { id: cur.id, name: cur.name, content, ok: true };
          } catch (e) {
            delete previewBuf2[cur.id];
            trackSpec([{ id: cur.id, state: 'fail', preview: '' }]);
            return { ...cur, content: `Cross-exam error: ${e.message}`, ok: false };
          }
        }
      }));

      clearInterval(previewTimer2);
      setMsgs(p => p.map(m => m.id !== aid ? m : {
        ...m, specialists: (m.specialists||[]).map(s => ({ ...s, preview: '' }))
      }));

      totalSevere = r2.reduce((n, o) => n + parseSeverity(o.content || '').severe, 0);
      critNote    = totalSevere > 0
        ? `\n⚠️ PRIORITY: ${totalSevere} [SEVERE] peer conflicts. Resolve EVERY one explicitly.\n\n` : '';
      track('round2', 'done',
        `Cross-exam complete. ${totalSevere > 0 ? `${totalSevere} SEVERE conflicts.` : 'Clean consensus.'}`,
        totalSevere > 0 ? 'CONFLICTS' : 'CLEAN'
      );

      // NEW: build heatmap rows from tagged claims for the UI to render
      const heatmap = r2.filter(r => r.ok).flatMap(r =>
        parseTaggedClaims(r.content || '').map(c => ({ from: r.name, ...c }))
      );
      setMsgs(p => p.map(m => m.id === aid ? { ...m, heatmap } : m));

      // FEATURE 2: live cost — Round 2 specialists + conflict extractor
      r2.filter(r => r.ok).forEach(r => addCost(aid, pickModel(r.id), 1800));
      addCost(aid, ROUTER_MODEL, 500); // conflict extraction call
    }

    // FEATURE 1: compute confidence before judge
    const r2ok = r2.filter(r => r.ok);
    const consensusSkipped = !conflict;
    const devilFound = !!devilNote;
    const confidence = calcConfidence(okR1, r2ok, consensusSkipped, devilFound);
    setMsgs(p => p.map(m => m.id === aid ? { ...m, confidence } : m));

    // ── 6. Judge — streamed token-by-token, throttled to 20fps ────────────────
    track('judge', 'active', 'Supreme Judge synthesizing...', totalSevere > 0 ? 'CONFLICT RESOLUTION' : 'SYNTHESIS');
    const judgeInput = `${critNote}${devilNote}ORIGINAL PROMPT:\n${prompt}\n\n${'═'.repeat(50)}\n${r2.map(r => `=== ${r.name} ===\n${r.content}`).join('\n\n')}`;
    const judgeModel = pickModel('judge');
    let synthesis, lastFlush = 0;
    const onJudgeToken = (partial) => {
      const now = Date.now();
      if (now - lastFlush > 50) {
        setMsgs(p => p.map(m => m.id === aid ? { ...m, content: partial, streaming: true } : m));
        lastFlush = now;
      }
    };
    try {
      synthesis = await callORStream(K, judgeModel,
        [{ role: 'system', content: JUDGE_PROMPT }, { role: 'user', content: judgeInput }],
        onJudgeToken, 2200, 0.05
      );
    } catch (_) {
      synthesis = await callOR(K, judgeModel,
        [{ role: 'system', content: JUDGE_PROMPT }, { role: 'user', content: judgeInput }],
        2200, 0.05
      );
    }
    // Clear streaming flag inside runCouncil too (belt + suspenders with runPipeline's final update)
    setMsgs(p => p.map(m => m.id === aid ? { ...m, content: synthesis, streaming: false } : m));
    addCost(aid, judgeModel, 2600); // judge: ~400 input (condensed) + ~2200 output
    track('judge', 'done', 'Master synthesis complete.', 'SUCCESS');
    return synthesis;
  };

  // ── PIPELINE RUNNER ─────────────────────────────────────────────────────────

  const runPipeline = async (text, chain) => {
    setLoading(true);
    costRef.current = 0; // reset live cost counter
    const K = config.openRouterKey;

    // Truncated prev user msgs for router context (cheap, fast)
    const priorUserMsgs = chain.slice(0, -1).filter(m => m.role === 'user' && m.content?.trim());
    const prevCtx       = priorUserMsgs.slice(-2).map(m => m.content.slice(0, 200)).join('\n\n');
    const hasHistory    = priorUserMsgs.length >= 2;

    let eff = mode, precomputed = null;
    // FIX 3: default the run tier to the user's selection (this acts as a budget ceiling).
    let effTier = config.tier || DEFAULT_TIER;
    runTierRef.current = effTier;

    if (mode === 'auto') {
      try {
        // Router + history summary run in parallel — no added latency
        const [routed, summary] = await Promise.all([
          runRouter(K, text, prevCtx),
          hasHistory ? summariseHistory(K, chain) : Promise.resolve('')
        ]);
        precomputed = { ...routed, historySummary: summary };
        // simple → Fusion, moderate → Strike (2-3 specialists, no Judge), hard → full Council
        if (routed.complexity === 'simple') eff = 'quick';
        else if (routed.complexity === 'moderate') eff = 'strike';
        else eff = 'council';
        // FIX 3: pick the price tier from complexity, never above the user's ceiling.
        effTier = capTier(tierForComplexity(routed.complexity), config.tier || DEFAULT_TIER);
        runTierRef.current = effTier;
      } catch (_) {
        const complex = text.length > 80 || text.includes('```')
          || /\b(review|fix|analyze|debug|check|code|function|class|help|implement|why|how|design|system)\b/i.test(text);
        eff = complex ? 'strike' : 'quick';
        effTier = capTier(complex ? 'medium' : 'low', config.tier || DEFAULT_TIER);
        runTierRef.current = effTier;
      }
    }
    const tierLabel = (MODEL_TIERS[effTier] || MODEL_TIERS[DEFAULT_TIER]).label;
    // NEW FEATURE 3: explain why Auto chose this mode
    const autoReason = (mode === 'auto') ? autoReasonText(
      precomputed?.complexity || (eff === 'quick' ? 'simple' : eff === 'strike' ? 'moderate' : 'hard'),
      eff, effTier
    ) : null;

    if (eff === 'quick') {
      const aid = Date.now() + 1;
      setMsgs(p => [...p, { role: 'assistant', content: '', id: aid, ts: Date.now(), engineMode: 'fusion', streaming: true, autoReason, cost: 0 }]);
      const ctx = chain.map(m => ({ role: m.role, content: m.content }));
      let done = false;

      // Attempt 1: streamed Fusion
      if (!done) {
        try {
          await callORStream(K, FUSION_MODEL, ctx,
            partial => setMsgs(p => p.map(m => m.id === aid ? { ...m, content: partial } : m)),
            1500, 0.4, { tools: [{ type: 'openrouter:fusion' }], tool_choice: 'required' }
          );
          done = true;
        } catch (_) {}
      }
      // Attempt 2: non-streamed Fusion
      if (!done) {
        try {
          const reply = await callFusion(K, text);
          setMsgs(p => p.map(m => m.id === aid ? { ...m, content: reply } : m));
          done = true;
        } catch (_) {}
      }
      // Attempt 3: streamed plain fast model (always reliable)
      if (!done) {
        try {
          await callORStream(K, ROUTER_MODEL, [
            { role: 'system', content: 'You are a precise, fast engineering assistant. Use clear markdown.' },
            ...ctx],
            partial => setMsgs(p => p.map(m => m.id === aid ? { ...m, content: partial } : m)),
            1200, 0.4
          );
        } catch (e) {
          setMsgs(p => p.map(m => m.id === aid ? { ...m, content: `**Error:** ${e.message}` } : m));
        }
      }
      setMsgs(p => p.map(m => m.id === aid ? { ...m, streaming: false } : m));

      // FEATURE 2: quick mode cost — one Fusion call
      addCost(aid, FUSION_MODEL, 1500);

      // FIX 5: fast, non-destructive second opinion. A different cheap model checks the
      // shown answer; we add a ✓ badge if clean, or a short note if it finds a real issue.
      // The answer is already displayed, so perceived speed is unchanged.
      let answerText = '';
      setMsgs(p => { const mm = p.find(x => x.id === aid); answerText = (mm && mm.content) || ''; return p; });
      if (answerText && !answerText.startsWith('**Error')) {
        try {
          const vModel = resolveModelId('deepseek/deepseek-v4-pro', modelSetRef.current);
          const raw = await callOR(K, vModel,
            [{ role: 'system', content: VERIFY_PROMPT },
             { role: 'user', content: `QUESTION:\n${text}\n\nANSWER:\n${answerText}` }],
            200, 0.0
          );
          const v = JSON.parse(raw.replace(/```json|```/g, '').trim());
          if (v && v.ok === true)      setMsgs(p => p.map(m => m.id === aid ? { ...m, verified: true } : m));
          else if (v && v.fix)         setMsgs(p => p.map(m => m.id === aid ? { ...m, verified: true, secondOpinion: String(v.fix) } : m));
          addCost(aid, vModel, 400); // verify call
        } catch (_) { /* best-effort: a failed check just leaves the answer as-is */ }
      }

    } else if (eff === 'strike') {
      // ── STRIKE: 2-3 specialists, Round 1 only, fast merge. No cross-exam, no Judge. ──
      const activeKeys = precomputed?.keys?.slice(0, 3) || SPEC_KEYS.slice(0, 3);
      const specialistRoster = activeKeys.map(k => ({
        id: k, name: SPECIALISTS[k].name, model: pickModel(k), state: 'dim', preview: ''
      }));
      const STRIKE_STEPS = [
        { key: 'router', label: 'Query Router',    state: 'done', meta: 'STRIKE MODE' },
        { key: 'round1', label: 'Specialist Panel', state: 'dim',  meta: 'WAITING'    },
        { key: 'merge',  label: 'Fast Merge',       state: 'dim',  meta: 'WAITING'    },
      ];
      const startedAt = Date.now();
      const aid = Date.now() + 5;
      setMsgs(p => [...p, {
        role: 'assistant', content: '', id: aid, engineMode: 'strike', tier: effTier, tierLabel,
        ts: Date.now(), steps: STRIKE_STEPS, specialists: specialistRoster, autoReason, cost: 0
      }]);

      const trackS = (key, state, label, meta) => {
        setMsgs(p => p.map(m => {
          if (m.id !== aid) return m;
          const steps = m.steps.map(s => s.key !== key ? s : { ...s, state, ...(label?{label}:{}), ...(meta?{meta}:{}) });
          return { ...m, steps };
        }));
      };
      const trackSpecS = (updates) => {
        setMsgs(p => p.map(m => m.id !== aid ? m : {
          ...m, specialists: (m.specialists||[]).map(s => {
            const u = updates.find(x => x.id === s.id);
            return u ? { ...s, ...u } : s;
          })
        }));
      };

      try {
        const plan = precomputed?.plan || {};
        const contextHeader = precomputed?.historySummary ? `CONVERSATION CONTEXT:\n${precomputed.historySummary}\n\n` : '';

        // Round 1 — parallel streaming specialists
        trackS('round1', 'active', `${activeKeys.length} specialists running...`);
        trackSpecS(activeKeys.map(k => ({ id: k, state: 'active', preview: '' })));
        const previewBufS = {};
        let previewTimerS = setInterval(() => {
          setMsgs(p => p.map(m => m.id !== aid ? m : {
            ...m, specialists: (m.specialists||[]).map(s => {
              const found = previewBufS[s.id];
              return found !== undefined ? { ...s, preview: found } : s;
            })
          }));
        }, 150);

        const r1 = await Promise.all(activeKeys.map(async key => {
          const spec    = SPECIALISTS[key];
          const model   = pickModel(key);
          const dir     = plan[`${key}_directive`] || `Analyze from your perspective as ${spec.name}.`;
          const userMsg = `${contextHeader}CURRENT REQUEST:\n${text}\n\nYOUR DIRECTIVE:\n${dir}`;
          try {
            const content = await callORStream(K, model,
              [{ role: 'system', content: spec.persona }, { role: 'user', content: userMsg }],
              (partial) => { previewBufS[key] = partial.slice(0, 180); },
              1000, 0.1
            );
            delete previewBufS[key];
            trackSpecS([{ id: key, state: 'done', preview: '' }]);
            return { id: key, name: spec.name, content, ok: true };
          } catch (_) {
            try {
              const content = await callOR(K, model,
                [{ role: 'system', content: spec.persona }, { role: 'user', content: userMsg }],
                1000, 0.1
              );
              delete previewBufS[key];
              trackSpecS([{ id: key, state: 'done', preview: '' }]);
              return { id: key, name: spec.name, content, ok: true };
            } catch (e) {
              delete previewBufS[key];
              trackSpecS([{ id: key, state: 'fail', preview: '' }]);
              return { id: key, name: spec.name, content: `Error: ${e.message}`, ok: false };
            }
          }
        }));

        clearInterval(previewTimerS);
        setMsgs(p => p.map(m => m.id !== aid ? m : {
          ...m, specialists: (m.specialists||[]).map(s => ({ ...s, preview: '' }))
        }));
        trackS('round1', 'done', 'Specialists complete.', `${r1.filter(r=>r.ok).length}/${activeKeys.length} OK`);

        // Fast merge — no Judge, no cross-exam, just quick synthesis
        trackS('merge', 'active', 'Merging...', 'SYNTHESIZING');
        const mergeModel  = pickModel('merge') || STRIKE_MODEL;
        const mergeInput = `QUESTION: ${text}\n\n${r1.filter(r=>r.ok).map(r=>`=== ${r.name} ===\n${r.content}`).join('\n\n')}`;
        let merged, lastFlushS = 0;
        try {
          merged = await callORStream(K, mergeModel,
            [{ role: 'system', content: STRIKE_PROMPT }, { role: 'user', content: mergeInput }],
            partial => {
              const now = Date.now();
              if (now - lastFlushS > 50) {
                setMsgs(p => p.map(m => m.id === aid ? { ...m, content: partial, streaming: true } : m));
                lastFlushS = now;
              }
            },
            1200, 0.1
          );
        } catch (_) {
          merged = await callOR(K, mergeModel,
            [{ role: 'system', content: STRIKE_PROMPT }, { role: 'user', content: mergeInput }],
            1200, 0.1
          );
        }

        const elapsed = Math.round((Date.now() - startedAt) / 1000);
        setMsgs(p => p.map(m => m.id === aid ? { ...m, content: merged, elapsed, streaming: false } : m));
        // FEATURE 2: strike cost — specialists + merge
        activeKeys.forEach(k => addCost(aid, pickModel(k), 1800));
        addCost(aid, mergeModel, 1400);
        trackS('merge', 'done', 'Strike complete.', 'SUCCESS');
      } catch (e) {
        setMsgs(p => p.map(m => m.id === aid ? {
          ...m, streaming: false,
          content: `### ⚠️ Strike Error\n\`\`\`\n${e.message}\n\`\`\`\nCheck your OpenRouter key in Config, then try again.`
        } : m));
      }

    } else if (eff === 'compare') {
      // ── FIX 2: BLIND A/B — full council vs one strong single model, order randomized.
      // Lets you actually prove whether the council wins on hard problems instead of guessing.
      const startedAt = Date.now();
      const aid = Date.now() + 7;
      const councilIsA = Math.random() < 0.5;
      const roster = SPEC_KEYS.map(k => ({
        id: k, name: SPECIALISTS[k].name, model: pickModel(k), state: 'dim', preview: ''
      }));
      const CMP_STEPS = [
        { key: 'router',   label: 'Question Disturber + Memory', state: 'dim', meta: 'WAITING' },
        ...(config.tavilyKey ? [{ key: 'web', label: 'Web Search', state: 'dim', meta: 'WAITING' }] : []),
        { key: 'round1',   label: 'Specialist Pipeline',         state: 'dim', meta: 'WAITING' },
        { key: 'severity', label: 'Severity Gate',               state: 'dim', meta: 'GATED'   },
        { key: 'round2',   label: 'Cross-Examination',           state: 'dim', meta: 'WAITING' },
        { key: 'judge',    label: 'Supreme Judge',               state: 'dim', meta: 'WAITING' },
      ];
      setMsgs(p => [...p, {
        role: 'assistant', id: aid, ts: Date.now(), engineMode: 'compare', tier: effTier, tierLabel,
        steps: CMP_STEPS, specialists: roster,
        compare: { revealed: false, items: [
          { slot: 'A', src: councilIsA ? 'council' : 'solo', content: '', done: false },
          { slot: 'B', src: councilIsA ? 'solo' : 'council', content: '', done: false },
        ] }
      }]);

      const soloSlot    = councilIsA ? 'B' : 'A';
      const councilSlot = councilIsA ? 'A' : 'B';
      const setSlot = (slot, patch) => setMsgs(p => p.map(m => m.id !== aid ? m : {
        ...m, compare: { ...m.compare, items: m.compare.items.map(it => it.slot === slot ? { ...it, ...patch } : it) }
      }));

      const soloModel = resolveModelId('anthropic/claude-opus-4.8', modelSetRef.current);
      const soloRun = (async () => {
        try {
          const out = await callORStream(K, soloModel,
            [{ role: 'system', content: SOLO_PROMPT }, { role: 'user', content: text }],
            partial => setSlot(soloSlot, { content: partial }), 2200, 0.3
          );
          setSlot(soloSlot, { content: out, done: true });
        } catch (_) {
          try {
            const out = await callOR(K, soloModel,
              [{ role: 'system', content: SOLO_PROMPT }, { role: 'user', content: text }], 2200, 0.3);
            setSlot(soloSlot, { content: out, done: true });
          } catch (e2) { setSlot(soloSlot, { content: `Error: ${e2.message}`, done: true }); }
        }
      })();

      const councilRun = (async () => {
        // allowSkip=false → council runs at full adversarial strength for a fair fight.
        try {
          const out = await runCouncil(text, aid, null, prevCtx, chain, false);
          setSlot(councilSlot, { content: out, done: true });
        } catch (e) { setSlot(councilSlot, { content: `Council error: ${e.message}`, done: true }); }
      })();

      await Promise.all([soloRun, councilRun]);
      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      setMsgs(p => p.map(m => m.id === aid ? { ...m, elapsed, streaming: false } : m));

    } else {
      const specialistRoster = SPEC_KEYS.map(k => ({
        id: k, name: SPECIALISTS[k].name, model: pickModel(k), state: 'dim', preview: ''
      }));
      const INIT_STEPS = [
        { key: 'router',   label: 'Question Disturber + Memory', state: 'dim', meta: 'WAITING' },
        ...(config.tavilyKey ? [{ key: 'web', label: 'Web Search', state: 'dim', meta: 'WAITING' }] : []),
        { key: 'round1',   label: 'Specialist Pipeline',         state: 'dim', meta: 'WAITING' },
        { key: 'severity', label: 'Severity Gate',               state: 'dim', meta: 'GATED'   },
        { key: 'round2',   label: 'Cross-Examination',           state: 'dim', meta: 'WAITING' },
        { key: 'judge',    label: 'Supreme Judge',               state: 'dim', meta: 'WAITING' },
      ];
      const startedAt = Date.now();
      const aid = Date.now() + 5;
      setMsgs(p => [...p, {
        role: 'assistant', content: '', id: aid, engineMode: 'council', tier: effTier, tierLabel,
        ts: Date.now(), steps: INIT_STEPS, specialists: specialistRoster, autoReason, cost: 0
      }]);
      try {
        // FIX 4: consensus-skip allowed only when the user chose Auto. Explicit Council = full pass.
        const result  = await runCouncil(text, aid, precomputed, prevCtx, chain, mode === 'auto');
        const elapsed = Math.round((Date.now() - startedAt) / 1000);
        // Explicit streaming: false here covers non-streamed fallback path inside runCouncil
        setMsgs(p => p.map(m => m.id === aid ? { ...m, content: result, elapsed, streaming: false } : m));
      } catch (e) {
        setMsgs(p => p.map(m => m.id === aid ? {
          ...m, streaming: false,
          content: `### ⚠️ Council Error\n\`\`\`\n${e.message}\n\`\`\`\nCheck your OpenRouter key in Config, then try again.`
        } : m));
      }
    }

    const finalId = chatId || `t${Date.now()}`;
    setMsgs(final => {
      const title = (final.find(m => m.role === 'user')?.content || 'Thread').slice(0, 52) + '…';
      setChats(prev => [{ id: finalId, title, messages: final, updatedAt: Date.now() }, ...prev.filter(c => c.id !== finalId)]);
      return final;
    });
    if (!chatId) setChatId(finalId);
    setLoading(false);
    setTimeout(() => taRef.current?.focus(), 60);
  };

  // ── HANDLERS ────────────────────────────────────────────────────────────────
  const handleSend = async () => {
    const text = input.trim();
    if (!text || loading) return;
    if (!config.openRouterKey) { setShowCfg(true); return; }
    setInput('');
    if (taRef.current) taRef.current.style.height = 'auto';
    const userMsg = { role: 'user', content: text, id: Date.now(), ts: Date.now() };
    const chain   = [...msgs, userMsg];
    setMsgs(chain);
    await runPipeline(text, chain);
  };

  const startEdit  = (id) => { if (loading) return; const m = msgs.find(m => m.id === id); if (!m || m.role !== 'user') return; setEditId(id); setEditTxt(m.content); };
  const cancelEdit = ()   => { setEditId(null); setEditTxt(''); };
  const commitEdit = async () => {
    const text = editTxt.trim();
    if (!text || !editId) { cancelEdit(); return; }
    const idx = msgs.findIndex(m => m.id === editId);
    if (idx === -1) { cancelEdit(); return; }
    const truncated = [...msgs.slice(0, idx), { ...msgs[idx], content: text, edited: true }];
    setEditId(null); setEditTxt('');
    setMsgs(truncated);
    await runPipeline(text, truncated);
  };

  const newSession = () => { setMsgs([]); setChatId(null); setEditId(null); setEditTxt(''); setSbOpen(false); };
  const loadChat   = c  => { setMsgs(c.messages||[]); setChatId(c.id); setEditId(null); setEditTxt(''); };
  const onKey    = e => { if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); handleSend(); } };
  const onResize = e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px'; };

  const activeTier = config.tier || DEFAULT_TIER;

  return html`
    <div class="app">
      <${Sidebar} chats=${chats} activeId=${chatId} onSelect=${loadChat} onNew=${newSession} visible=${sbOpen} onClose=${() => setSbOpen(false)} onConfig=${() => setShowCfg(true)}/>
      <div class="main">
        <div class="topbar">
          <button class="menu-btn" onClick=${() => setSbOpen(true)}>☰</button>
          <span class="top-title">OpenOrb.ai</span>
          <div class="mode-sel">
            ${[['auto','⚡ Auto'],['quick','💬 Quick'],['council','🔬 Council'],['compare','⚖️ Compare']].map(([m,l]) => html`
              <button key=${m} class=${`mode-btn${mode===m?' on':''}`} onClick=${() => handleModeChange(m)}>${l}</button>`)}
          </div>
          ${showInstall && html`
            <button class="install-btn" onClick=${handleInstall}>📲 Install app</button>`}
        </div>
        <div class="mode-desc">${MODE_DESC[mode]}</div>
        ${showInstModal && html`
          <div class="inst-modal" onClick=${e => { if (e.target === e.currentTarget) setShowInstModal(false); }}>
            <div class="inst-card">
              <h3>📲 Add OpenOrb to your home screen</h3>
              <p class="inst-intro">${iosRef.current
                ? 'In Safari, add OpenOrb to your home screen — it opens full-screen like a real app.'
                : 'Add OpenOrb to your home screen so you don\'t need to open the browser.'}</p>
              <div class="inst-steps">
                ${iosRef.current ? html`
                  <div class="inst-row"><b>1</b><span>Tap the <b>Share</b> button at the bottom of Safari (square with arrow).</span></div>
                  <div class="inst-row"><b>2</b><span>Scroll down and tap <b>Add to Home Screen</b>.</span></div>
                  <div class="inst-row"><b>3</b><span>Tap <b>Add</b>. OpenOrb now lives on your home screen.</span></div>
                ` : html`
                  <div class="inst-row"><b>1</b><span>Open your browser's <b>⋮ menu</b> (top-right).</span></div>
                  <div class="inst-row"><b>2</b><span>Tap <b>Install app</b> or <b>Add to Home Screen</b>.</span></div>
                  <div class="inst-row"><b>3</b><span>Confirm. OpenOrb opens full-screen from your home screen.</span></div>
                `}
              </div>
              <button class="inst-close" onClick=${() => setShowInstModal(false)}>Got it</button>
            </div>
          </div>`}
        <div class="msgs">
          ${msgs.length === 0 && !loading && html`
            <div class="welcome">
              <div style="font-size:40px;margin-bottom:12px;filter:drop-shadow(0 0 14px rgba(124,58,237,.5))">🔮</div>
              <h1>OpenOrb.ai</h1>
              <p>
                Multiple AIs analyze your question, argue, and deliver one answer. You see every step.${config.tavilyKey ? ' Web search enabled.' : ''}
              </p>
              ${modelStatus.checked && modelStatus.remaps.length > 0 && html`
                <div class="mdl-status warn">
                  <span>⚠️</span>
                  <span><strong>${modelStatus.remaps.length} model${modelStatus.remaps.length===1?'':'s'} unavailable on OpenRouter — using live fallbacks:</strong>
                  ${modelStatus.remaps.slice(0,4).map(r => `${shortModel(r.from)} → ${shortModel(r.to)}`).join(', ')}${modelStatus.remaps.length>4?' …':''}</span>
                </div>`}
              ${modelStatus.checked && modelStatus.remaps.length === 0 && html`
                <div class="mdl-status ok"><span>✓</span><span>All configured models verified live on OpenRouter.</span></div>`}
              <div class="diversity-bar">
                <span style="font-size:11px;color:var(--muted)">Tier ceiling:</span>
                <span class=${`div-chip ${activeTier==='high'?'quality':activeTier==='medium'?'reason':'fast'}`}>
                  ${MODEL_TIERS[activeTier].label}
                </span>
                <span style="font-size:10px;color:var(--dim)">${MODEL_TIERS[activeTier].cost}</span>
              </div>
              <div class="ex-chips">
                <button class="ex-chip" onClick=${() => setInput("What's the difference between TCP and UDP, and when should I use each?")}>
                  💡 What's the difference between TCP and UDP, and when should I use each?
                </button>
                <button class="ex-chip" onClick=${() => setInput("Review this code for bugs and performance issues:\n\n")}>
                  🐛 Review this code for bugs and performance issues:
                </button>
                <button class="ex-chip" onClick=${() => setInput("Design a rate limiter for a high-traffic API — what are the tradeoffs?")}>
                  🏗️ Design a rate limiter for a high-traffic API — what are the tradeoffs?
                </button>
              </div>

            </div>`}
          ${msgs.map(m => html`
            <${MsgBubble} key=${m.id} msg=${m}
              editId=${editId} editContent=${editTxt}
              onEditStart=${startEdit} onEditChange=${setEditTxt}
              onEditSave=${commitEdit} onEditCancel=${cancelEdit}
              loading=${loading}/>`)}
          <div ref=${scrollRef}></div>
        </div>
        <div class="inputbar">
          <div class="input-wrap">
            <textarea ref=${taRef} value=${input}
              class=${modeChanged ? 'input-pulse' : ''}
              disabled=${loading || editId !== null}
              placeholder=${loading ? (mode==='quick' ? 'Thinking…' : mode==='compare' ? 'Running comparison…' : mode==='council' ? 'Council deliberating…' : 'Processing…') : editId ? 'Finish editing above first…' :
                mode==='council' ? 'Input complex system challenge…' : mode==='quick' ? 'Input quick query…' :
                mode==='compare' ? 'Input query to compare council vs single model…' :
                'Input query — simple → Fusion, everything else → Council…'}
              onInput=${e => { setInput(e.target.value); onResize(e); }}
              onKeyDown=${onKey} rows="1"></textarea>
            <button class="send-btn" disabled=${loading || !input.trim() || editId !== null} onClick=${handleSend}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
          <p class="input-hint">Enter for new line · Send button to send · ✏ to edit any sent message</p>
        </div>
      </div>
      ${showCfg && html`<${SettingsModal} config=${config} onClose=${() => setShowCfg(false)} onSave=${c => setConfig(c)}/>`}
    </div>`;
}

render(html`<${App}/>`, document.getElementById('root'));
</script>
